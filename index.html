<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple WebRTC Audio Call</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #f9f9f9; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1rem; }
    button { background: #0052cc; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    input { padding: 10px; font-size: 1rem; width: calc(100% - 24px); margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    h1, h2 { color: #333; margin-top: 0; }
    #status { margin-top: 15px; font-weight: bold; color: #d93025; }
  </style>
</head>
<body>

  <div class="card">
    <h1>WebRTC Audio Caller</h1>
    <p>A pure HTML/JS peer-to-peer audio calling app.</p>
    <div id="status">Status: Waiting to start...</div>
  </div>

  <div class="card">
    <h2>Start a Call</h2>
    <button id="startCallBtn">1. Start Call (Generate ID)</button>
    <p>Share this Call ID with your friend:</p>
    <input type="text" id="generatedCallId" readonly placeholder="Call ID will appear here">
  </div>

  <div class="card">
    <h2>Join a Call</h2>
    <input type="text" id="callIdInput" placeholder="Paste friend's Call ID here">
    <button id="joinCallBtn">2. Join Call</button>
  </div>

  <audio id="remoteAudio" autoplay></audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Your specific Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAYHA8Qw3Qw3Qzbyg8MtjrSKcJusNi4VaA6V4",
      authDomain: "system-data-bf026.firebaseapp.com",
      projectId: "system-data-bf026",
      storageBucket: "system-data-bf026.firebasestorage.app",
      messagingSenderId: "718302899022",
      appId: "1:718302899022:web:f1675dbcc293e138c68c1f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ==========================================
    // WEBRTC LOGIC
    // ==========================================
    const servers = {
      iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }],
      iceCandidatePoolSize: 10,
    };

    let pc = new RTCPeerConnection(servers);
    let localStream = null;
    let remoteStream = null;

    const startCallBtn = document.getElementById('startCallBtn');
    const joinCallBtn = document.getElementById('joinCallBtn');
    const generatedCallIdInput = document.getElementById('generatedCallId');
    const callIdInput = document.getElementById('callIdInput');
    const remoteAudio = document.getElementById('remoteAudio');
    const statusDiv = document.getElementById('status');

    // Get Microphone Access
    async function setupMedia() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
        remoteStream = new MediaStream();

        localStream.getTracks().forEach((track) => {
          pc.addTrack(track, localStream);
        });

        pc.ontrack = (event) => {
          event.streams[0].getTracks().forEach((track) => {
            remoteStream.addTrack(track);
          });
          remoteAudio.srcObject = remoteStream;
        };
        statusDiv.innerText = "Status: Microphone connected.";
        statusDiv.style.color = "green";
      } catch (err) {
        statusDiv.innerText = "Error: Please allow microphone access. (Ensure you are on HTTPS)";
        console.error(err);
      }
    }

    // Create Call (Caller)
    startCallBtn.onclick = async () => {
      startCallBtn.disabled = true;
      await setupMedia();

      // Generate random call ID
      const callId = Math.random().toString(36).substring(2, 9);
      const callDoc = doc(collection(db, 'calls'), callId);
      const offerCandidates = collection(callDoc, 'offerCandidates');
      const answerCandidates = collection(callDoc, 'answerCandidates');

      generatedCallIdInput.value = callId;
      statusDiv.innerText = "Status: Call created. Waiting for friend to join...";

      // Get ICE candidates
      pc.onicecandidate = (event) => {
        event.candidate && addDoc(offerCandidates, event.candidate.toJSON());
      };

      // Create Offer
      const offerDescription = await pc.createOffer();
      await pc.setLocalDescription(offerDescription);

      const offer = {
        sdp: offerDescription.sdp,
        type: offerDescription.type,
      };

      await setDoc(callDoc, { offer });

      // Listen for Answer
      onSnapshot(callDoc, (snapshot) => {
        const data = snapshot.data();
        if (!pc.currentRemoteDescription && data?.answer) {
          const answerDescription = new RTCSessionDescription(data.answer);
          pc.setRemoteDescription(answerDescription);
          statusDiv.innerText = "Status: Connected! You are now talking.";
          statusDiv.style.color = "green";
        }
      });

      // Listen for Remote ICE Candidates
      onSnapshot(answerCandidates, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === 'added') {
            const candidate = new RTCIceCandidate(change.doc.data());
            pc.addIceCandidate(candidate);
          }
        });
      });
    };

    // Join Call (Receiver)
    joinCallBtn.onclick = async () => {
      const callId = callIdInput.value;
      if (!callId) {
        alert("Please enter a valid Call ID.");
        return;
      }
      
      joinCallBtn.disabled = true;
      await setupMedia();
      statusDiv.innerText = "Status: Joining call...";

      const callDoc = doc(collection(db, 'calls'), callId);
      const offerCandidates = collection(callDoc, 'offerCandidates');
      const answerCandidates = collection(callDoc, 'answerCandidates');

      pc.onicecandidate = (event) => {
        event.candidate && addDoc(answerCandidates, event.candidate.toJSON());
      };

      // Read Offer
      const callData = (await getDoc(callDoc)).data();
      if (!callData) {
        statusDiv.innerText = "Status: Call ID not found.";
        statusDiv.style.color = "red";
        joinCallBtn.disabled = false;
        return;
      }

      const offerDescription = callData.offer;
      await pc.setRemoteDescription(new RTCSessionDescription(offerDescription));

      // Create Answer
      const answerDescription = await pc.createAnswer();
      await pc.setLocalDescription(answerDescription);

      const answer = {
        sdp: answerDescription.sdp,
        type: answerDescription.type,
      };

      await updateDoc(callDoc, { answer });
      statusDiv.innerText = "Status: Connected! You are now talking.";
      statusDiv.style.color = "green";

      // Listen for Remote ICE Candidates
      onSnapshot(offerCandidates, (snapshot) => {
        snapshot.docChanges().forEach((change) => {
          if (change.type === 'added') {
            const candidate = new RTCIceCandidate(change.doc.data());
            pc.addIceCandidate(candidate);
          }
        });
      });
    };
  </script>
</body>
</html>
