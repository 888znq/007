<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEERLINK — Always On</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2a2a30;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.12);
      --accent-glow: rgba(0, 229, 255, 0.4);
      --text: #e8e8ec;
      --muted: #6b6b78;
      --danger: #ff4d6d;
      --success: #00e5a0;
      --warning: #ffd166;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,229,160,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .header {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .logo-icon svg { color: var(--accent); }

    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .status-bar.connecting .status-dot { background: var(--warning); animation: pulse 1.2s ease-in-out infinite; }
    .status-bar.connected .status-dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-bar.error .status-dot { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #statusText { color: var(--text); }
    .status-bar.connected #statusText { color: var(--success); }
    .status-bar.error #statusText { color: var(--danger); }
    .status-bar.connecting #statusText { color: var(--warning); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.3s;
    }

    .card:hover { border-color: rgba(255,255,255,0.12); }

    .waveform {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 24px;
      margin-top: 0.75rem;
    }
    .waveform.active { display: flex; }
    .waveform span {
      display: block;
      width: 3px;
      border-radius: 3px;
      background: var(--success);
      animation: wave 1.2s ease-in-out infinite;
    }
    .waveform span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .waveform span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .waveform span:nth-child(3) { height: 20px; animation-delay: 0.2s; }
    .waveform span:nth-child(4) { height: 14px; animation-delay: 0.3s; }
    .waveform span:nth-child(5) { height: 8px; animation-delay: 0.4s; }
    .waveform span:nth-child(6) { height: 18px; animation-delay: 0.15s; }
    .waveform span:nth-child(7) { height: 10px; animation-delay: 0.25s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    .footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      padding-bottom: 0.5rem;
    }

    .talk-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: all 0.2s ease;
      box-shadow: 0 0 24px var(--accent-glow);
      margin: 0 auto;
      user-select: none;
      -webkit-user-select: none;
    }
    .talk-btn:active { transform: scale(0.95); }
    .talk-btn.active {
      background: rgba(0,229,160,0.18);
      border-color: var(--success);
      color: var(--success);
      box-shadow: 0 0 40px rgba(0,229,160,0.5);
      animation: talkPulse 1.5s ease-in-out infinite;
    }
    .talk-btn.disabled-btn {
      border-color: var(--muted);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      box-shadow: none;
      cursor: not-allowed;
    }
    @keyframes talkPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(0,229,160,0.4); }
      50% { box-shadow: 0 0 60px rgba(0,229,160,0.8); }
    }

    .talk-icon { font-size: 2rem; line-height: 1; }

    .buzz-btn {
      background: rgba(255,77,109,0.12);
      color: var(--danger);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 0.7rem 1.4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0 auto;
    }
    .buzz-btn:hover:not(:disabled) {
      background: rgba(255,77,109,0.25);
      box-shadow: 0 0 16px rgba(255,77,109,0.4);
    }
    .buzz-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .buzz-alert {
      display: none;
      background: rgba(255,77,109,0.15);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.82rem;
      color: var(--danger);
      animation: buzzFlash 0.4s ease-in-out infinite alternate;
    }
    .buzz-alert.visible { display: block; }
    @keyframes buzzFlash {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    .controls-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .notif-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
    .notif-bar.granted { color: var(--success); border-color: var(--success); }
    .notif-bar.denied { color: var(--danger); border-color: var(--danger); }
  </style>
</head>

  const fbApp   = initializeApp(firebaseConfig);

  const ROOM_ID     = 'peerlink-room-1';
  const callDoc     = doc(db, 'calls', ROOM_ID);
  const offerCands  = collection(callDoc, 'offerCandidates');
  const answerCands = collection(callDoc, 'answerCandidates');
  const buzzDoc     = doc(db, 'buzz', ROOM_ID);
  const tokensDoc   = doc(db, 'tokens', ROOM_ID);

  const servers = {
    iceServers: [
      { urls: ['stun:stun.l.google.com:19302'] },
      { urls: ['stun:stun1.l.google.com:19302'] },
      { urls: ['stun:stun2.l.google.com:19302'] },
    ],
    iceCandidatePoolSize: 10,
  };

  let pc          = null;
  let localStream = null;
  let micEnabled  = false;
  let isCaller    = false;
  let ready       = false;
  var myTokenSlot = null; // 'a' or 'b'

  const talkBtn     = document.getElementById('talkBtn');
  const talkLabel   = document.getElementById('talkLabel');
  const buzzBtn     = document.getElementById('buzzBtn');
  const buzzAlert   = document.getElementById('buzzAlert');
  const remoteAudio = document.getElementById('remoteAudio');
  const statusBar   = document.getElementById('statusBar');
  const statusText  = document.getElementById('statusText');
  const waveform    = document.getElementById('waveform');
  const notifBar    = document.getElementById('notifBar');

  function setStatus(msg, state = '') {
    statusText.textContent = msg;
    statusBar.className = 'status-bar ' + state;
  }

  // ── GENERATE OAUTH TOKEN FROM SERVICE ACCOUNT (browser-side) ──
  async function getOAuthToken() {
    const header = { alg: 'RS256', typ: 'JWT' };
    const now = Math.floor(Date.now() / 1000);
    const claim = {
      iss: SA_EMAIL,
      scope: 'https://www.googleapis.com/auth/firebase.messaging',
      aud: 'https://oauth2.googleapis.com/token',
      exp: now + 3600,
      iat: now
    };

    function b64url(obj) {
      return btoa(JSON.stringify(obj))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    const sigInput = b64url(header) + '.' + b64url(claim);

    // Import the private key
    const pemBody = SA_PRIVATE_KEY.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g, '');
    const binaryDer = Uint8Array.from(atob(pemBody), c => c.charCodeAt(0));
    const cryptoKey = await crypto.subtle.importKey(
      'pkcs8', binaryDer.buffer,
      { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
      false, ['sign']
    );

    const encoder = new TextEncoder();
    const sigBuffer = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, encoder.encode(sigInput));
    const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuffer)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

    const jwt = sigInput + '.' + sig;

    const resp = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
    });
    const data = await resp.json();
    return data.access_token;
  }

  // ── SEND PUSH NOTIFICATION via FCM V1 ──
  async function sendPushToOther() {
    try {
      const snap = await getDoc(tokensDoc);
      if (!snap.exists()) return;
      const tokens = snap.data();
      const otherSlot = myTokenSlot === 'a' ? 'b' : 'a';
      const otherToken = tokens[otherSlot];
      if (!otherToken) return;

      const accessToken = await getOAuthToken();

      await fetch(`https://fcm.googleapis.com/v1/projects/${PROJECT_ID}/messages:send`, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: {
            token: otherToken,
            notification: {
              title: '⚡ PEERLINK BUZZ',
              body: 'Someone wants to talk — tap to open!'
            }
          }
        })
      });
    } catch (e) {
      console.warn('Push failed:', e);
    }
  }

  // ── FCM TOKEN REGISTRATION ──
  async function setupPushNotifications() {
    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        notifBar.textContent = '🔕 Notifications blocked — buzz won\'t wake the other side';
        notifBar.className = 'notif-bar denied';
        return;
      }

      // Register service worker
      const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

      const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
      if (!token) return;

      // Save token to Firestore — slot 'a' or 'b'
      const snap = await getDoc(tokensDoc);
      const existing = snap.exists() ? snap.data() : {};

      if (!existing.a) {
        myTokenSlot = 'a';
        await setDoc(tokensDoc, { ...existing, a: token });
      } else if (!existing.b || existing.b === token) {
        myTokenSlot = 'b';
        await setDoc(tokensDoc, { ...existing, b: token });
      } else {
        // Both slots taken — overwrite slot a (assume stale)
        myTokenSlot = 'a';
        await setDoc(tokensDoc, { a: token, b: existing.b });
      }

      notifBar.textContent = '🔔 Push notifications active — buzz works even when app is closed';
      notifBar.className = 'notif-bar granted';

      // Handle foreground messages
      onMessage(messaging, payload => {
        showBuzzAlert();
      });

    } catch (e) {
      console.warn('Push setup failed:', e);
      notifBar.textContent = '⚠️ Push setup failed — buzz works only when app is open';
      notifBar.className = 'notif-bar';
    }
  }

  // ── MIC TOGGLE ──
  function setMic(on) {
    if (!localStream) return;
    localStream.getAudioTracks().forEach(t => { t.enabled = on; });
    micEnabled = on;
    if (on) {
      talkBtn.classList.add('active');
      talkBtn.classList.remove('disabled-btn');
      talkLabel.textContent = 'TALKING';
      waveform.classList.add('active');
    } else {
      talkBtn.classList.remove('active');
      talkLabel.textContent = 'TALK';
      waveform.classList.remove('active');
    }
  }

  talkBtn.onclick = () => {
    if (!ready) return;
    setMic(!micEnabled);
  };

  // ── BUZZ ──
  buzzBtn.onclick = async () => {
    buzzBtn.disabled = true;
    await setDoc(buzzDoc, { ts: Date.now() });
    await sendPushToOther(); // ← sends push notification to other device
    setTimeout(() => { buzzBtn.disabled = false; }, 3000);
  };

  let buzzAlertTimer = null;
  function showBuzzAlert() {
    buzzAlert.classList.add('visible');
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    playBuzzSound();
    clearTimeout(buzzAlertTimer);
    buzzAlertTimer = setTimeout(() => buzzAlert.classList.remove('visible'), 4000);
  }

  function playBuzzSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(offset => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = 520;
      gain.gain.setValueAtTime(0.6, ctx.currentTime + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.15);
      osc.start(ctx.currentTime + offset);
      osc.stop(ctx.currentTime + offset + 0.15);
    });
  }

  // Watch for incoming buzz (when app is open)
  let lastBuzzTs = 0;
  onSnapshot(buzzDoc, snap => {
    if (!snap.exists()) return;
    const ts = snap.data()?.ts || 0;
    if (ts > lastBuzzTs) {
      lastBuzzTs = ts;
      showBuzzAlert();
    }
  });

  // ── CONNECTION HANDLERS ──
  function onConnected() {
    setStatus('Line open. Mic is OFF — press TALK to speak.', 'connected');
    talkBtn.classList.remove('disabled-btn');
    buzzBtn.disabled = false;
    ready = true;
  }

  function attachConnectionHandlers() {
    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      if (s === 'connected') onConnected();
      else if (s === 'disconnected' || s === 'failed') {
        setStatus('Connection lost. Reload to reconnect.', 'error');
        ready = false;
        talkBtn.classList.add('disabled-btn');
        buzzBtn.disabled = true;
        waveform.classList.remove('active');
      }
    };
    pc.oniceconnectionstatechange = () => {
      if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') onConnected();
    };
  }

  // ── MEDIA SETUP ──
  async function setupMedia() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      localStream.getAudioTracks().forEach(t => { t.enabled = false; });
      return true;
    } catch (err) {
      setStatus('Mic denied. Allow mic access and reload.', 'error');
      return false;
    }
  }

  function createPeerConnection() {
    pc = new RTCPeerConnection(servers);
    const remoteStream = new MediaStream();
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    pc.ontrack = event => {
      event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
      remoteAudio.srcObject = remoteStream;
      remoteAudio.play().catch(e => console.warn('Audio play blocked:', e));
    };
    attachConnectionHandlers();
    return pc;
  }

  // ── AUTO-JOIN LOGIC ──
  async function autoConnect() {
    const ok = await setupMedia();
    if (!ok) return;

    // ── CLEANUP STALE SESSION ──
    try {
      await deleteDoc(callDoc);
    } catch (_) {}
    await new Promise(r => setTimeout(r, 600));

    createPeerConnection();

    let snap;
    try {
      snap = await getDoc(callDoc);
    } catch (err) {
      setStatus('Firestore error: ' + (err.message || err.code), 'error');
      return;
    }

    const data = snap.data();

    if (!data?.offer) {
      isCaller = true;
      setStatus('Waiting for other person...', 'connecting');

      pc.onicecandidate = event => {
        if (event.candidate) addDoc(offerCands, event.candidate.toJSON());
      };

      const offerDesc = await pc.createOffer();
      await pc.setLocalDescription(offerDesc);
      await setDoc(callDoc, { offer: { sdp: offerDesc.sdp, type: offerDesc.type } });

      onSnapshot(callDoc, snapshot => {
        const d = snapshot.data();
        if (!pc.currentRemoteDescription && d?.answer) {
          pc.setRemoteDescription(new RTCSessionDescription(d.answer));
        }
      });

      onSnapshot(answerCands, snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
        });
      });

    } else {
      isCaller = false;
      setStatus('Joining existing line...', 'connecting');

      pc.onicecandidate = event => {
        if (event.candidate) addDoc(answerCands, event.candidate.toJSON());
      };

      onSnapshot(offerCands, snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === 'added' && pc.remoteDescription) {
            pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
          }
        });
      });

      try {
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answerDesc = await pc.createAnswer();
        await pc.setLocalDescription(answerDesc);
        await updateDoc(callDoc, { answer: { sdp: answerDesc.sdp, type: answerDesc.type } });
        setStatus('Answer sent. Connecting...', 'connecting');
      } catch (err) {
        setStatus('SDP error: ' + err.message, 'error');
      }
    }
  }

  // ── KICK OFF ──
  setupPushNotifications();
  autoConnect();
</script>
</body>
