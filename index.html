<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Audio Call</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000432;
      --surface: #000432;
      --border: #ffffff;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.12);
      --accent-glow: rgba(0, 229, 255, 0.4);
      --text: #ffffff;
            --muted: #ffffff;
      --danger: #ff4d6d;
      --success: #00e5a0;
      --warning: #ffd166;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #000432;
            color: var(--text);
            min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,229,160,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .logo-icon svg { color: #ffffff; }

    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffffff;
            letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Status Bar */
    .status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      transition: all 0.3s ease;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    .status-bar.connecting .status-dot {
      background: var(--warning);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .status-bar.connected .status-dot {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }
    .status-bar.error .status-dot { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    #statusText { color: var(--text); }
    .status-bar.connected #statusText { color: var(--success); }
    .status-bar.error #statusText { color: var(--danger); }
    .status-bar.connecting #statusText { color: var(--warning); }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.3s;
    }

    .card:hover { border-color: rgba(255,255,255,0.12); }

    .card-label {
          font-family: 'IBM Plex Mono', monospace;
          font-size: 0.7rem;
          font-weight: 600;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: #ffffff;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-label::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 12px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* Inputs */
    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;
    }

    input[type="text"] {
      flex: 1;
      background: #000432;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.65rem 0.9rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"][readonly] { color: var(--accent); cursor: default; }

    /* Buttons */
    .btn {
          background: var(--accent-dim);
          color: #ffffff;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0.65rem 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      background: rgba(0,229,255,0.2);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled {
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border-color: var(--border);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-full {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.85rem;
    }

    /* Copy hint */
    .copy-hint {
          font-size: 0.72rem;
          color: #ffffff;
      margin-top: 0.5rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Divider */
    .divider {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          color: #ffffff;
      font-size: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Connection animation */
    .waveform {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 24px;
      margin-top: 0.75rem;
    }
    .waveform.active { display: flex; }
    .waveform span {
      display: block;
      width: 3px;
      border-radius: 3px;
      background: var(--success);
      animation: wave 1.2s ease-in-out infinite;
    }
    .waveform span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .waveform span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
    .waveform span:nth-child(3) { height: 20px; animation-delay: 0.2s; }
    .waveform span:nth-child(4) { height: 14px; animation-delay: 0.3s; }
    .waveform span:nth-child(5) { height: 8px; animation-delay: 0.4s; }
    .waveform span:nth-child(6) { height: 18px; animation-delay: 0.15s; }
    .waveform span:nth-child(7) { height: 10px; animation-delay: 0.25s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    .footer {
              text-align: center;
              font-size: 0.72rem;
              color: #ffffff;
          font-family: 'IBM Plex Mono', monospace;
          padding-bottom: 0.5rem;
        }
    
        /* Modal Styles */
        .modal-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0, 4, 50, 0.85);
          backdrop-filter: blur(4px);
          display: none;
          align-items: center;
          justify-content: center;
          z-index: 100;
          opacity: 0;
          transition: opacity 0.2s ease;
        }
        .modal-overlay.active {
          display: flex;
          opacity: 1;
        }
        .modal {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 1.5rem;
          width: 90%;
          max-width: 360px;
          box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
          transform: translateY(20px);
          transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal {
          transform: translateY(0);
        }
        .modal-title {
                  font-family: 'IBM Plex Mono', monospace;
                  color: #ffffff;
          margin-bottom: 1rem;
          font-size: 1rem;
        }
        .modal-actions {
          display: flex;
          gap: 0.5rem;
          margin-top: 1rem;
          justify-content: flex-end;
        }
      </style>
</head>
<body>

  <div class="app">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <h1>PEERLINK</h1>
      </div>
      <p class="subtitle">peer-to-peer audio // webrtc</p>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">Waiting to start...</span>
    </div>

    <div class="card">
      <div class="card-label">Start a Call</div>
      <button class="btn btn-full" id="startCallBtn">Generate Call ID</button>
      <div id="callIdSection" style="margin-top: 0.75rem; display: none;">
        <div class="input-row">
                  <input type="text" id="generatedCallId" readonly placeholder="Call ID will appear here">
                  <button class="btn" id="copyBtn" title="Copy ID">Copy</button>
                  <button class="btn" id="smsBtn" title="Send via SMS">SMS</button>
                </div>
        <p class="copy-hint">Share this ID with the other person</p>
      </div>
    </div>

    <div class="divider">or</div>

    <div class="card">
      <div class="card-label">Join a Call</div>
      <div class="input-row">
        <input type="text" id="callIdInput" placeholder="Paste Call ID here">
        <button class="btn" id="joinCallBtn">Join</button>
      </div>
    </div>

    <div class="waveform" id="waveform">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>

    <div class="footer">requires microphone access · https only</div>
  </div>

  <div class="modal-overlay" id="smsModal">
      <div class="modal">
        <div class="modal-title">Send Code via SMS</div>
        <input type="text" id="smsPhoneInput" placeholder="Enter mobile number" autocomplete="tel">
        <div class="modal-actions">
          <button class="btn" id="cancelSmsBtn" style="background: transparent; color: #ffffff; border-color: var(--border);">Cancel</button>
          <button class="btn" id="sendSmsBtn">Send</button>
        </div>
      </div>
    </div>
  
    <audio id="remoteAudio" autoplay playsinline></audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
          apiKey: "AIzaSyCX-bZLDHy-6wxuc5b8YInV_Mr7uYOTmgk",
          authDomain: "trinity-os-8edd0.firebaseapp.com",
          databaseURL: "https://trinity-os-8edd0-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "trinity-os-8edd0",
          storageBucket: "trinity-os-8edd0.firebasestorage.app",
          messagingSenderId: "692349337854",
          appId: "1:692349337854:web:ef24ead6e7362a5772a5af"
        };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const servers = {
      iceServers: [
        { urls: ['stun:stun.l.google.com:19302'] },
        { urls: ['stun:stun1.l.google.com:19302'] },
        { urls: ['stun:stun2.l.google.com:19302'] },
      ],
      iceCandidatePoolSize: 10,
    };

    let pc = null;
    let localStream = null;

    const startCallBtn    = document.getElementById('startCallBtn');
    const joinCallBtn     = document.getElementById('joinCallBtn');
    const generatedCallId = document.getElementById('generatedCallId');
    const callIdSection   = document.getElementById('callIdSection');
    const callIdInput     = document.getElementById('callIdInput');
    const remoteAudio     = document.getElementById('remoteAudio');
    const statusBar       = document.getElementById('statusBar');
    const statusText      = document.getElementById('statusText');
    const copyBtn         = document.getElementById('copyBtn');
        const waveform        = document.getElementById('waveform');
        var smsBtn          = document.getElementById('smsBtn');
        var smsModal        = document.getElementById('smsModal');
        var smsPhoneInput   = document.getElementById('smsPhoneInput');
        var cancelSmsBtn    = document.getElementById('cancelSmsBtn');
        var sendSmsBtn      = document.getElementById('sendSmsBtn');

    function setStatus(msg, state = '') {
      statusText.textContent = msg;
      statusBar.className = 'status-bar ' + state;
    }

    function setConnected() {
      setStatus('Connected! You are now talking.', 'connected');
      waveform.classList.add('active');
    }

    // ──────────────────────────────────────────────
    // FIX: Watch connection state to update UI
    // ──────────────────────────────────────────────
    function attachConnectionHandlers(pc) {
      pc.onconnectionstatechange = () => {
        const s = pc.connectionState;
        console.log('connectionState:', s);
        if (s === 'connected') {
          setConnected();
        } else if (s === 'disconnected' || s === 'failed') {
          setStatus('Call ended or connection failed.', 'error');
          waveform.classList.remove('active');
        } else if (s === 'connecting') {
          setStatus('Connecting...', 'connecting');
        }
      };

      pc.oniceconnectionstatechange = () => {
        console.log('iceConnectionState:', pc.iceConnectionState);
        if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          setConnected();
        }
      };
    }

    async function setupMedia() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
        setStatus('Microphone ready.', '');
        return true;
      } catch (err) {
        setStatus('Mic access denied. Use HTTPS and allow mic.', 'error');
        console.error(err);
        return false;
      }
    }

    function createPeerConnection() {
      pc = new RTCPeerConnection(servers);
      const remoteStream = new MediaStream();

      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.ontrack = event => {
              event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
              remoteAudio.srcObject = remoteStream;
              remoteAudio.play().catch(e => console.warn('Audio play blocked:', e));
            };

      attachConnectionHandlers(pc);
      return pc;
    }

    // ──────────────────────────────────────────────
    // START CALL (Caller side)
    // ──────────────────────────────────────────────
    startCallBtn.onclick = async () => {
          startCallBtn.disabled = true;
    
          var ok = await setupMedia();
          if (!ok) { startCallBtn.disabled = false; return; }
    
          createPeerConnection();
    
          var callId    = Math.floor(1000000 + Math.random() * 9000000).toString();
          var callDoc   = doc(collection(db, 'calls'), callId);
          var offerCands = collection(callDoc, 'offerCandidates');
          var answerCands = collection(callDoc, 'answerCandidates');
    
          generatedCallId.value = callId;
          callIdSection.style.display = 'block';
          setStatus('Waiting for friend to join...', 'connecting');
    
          // FIX: Collect ICE candidates BEFORE creating offer
          pc.onicecandidate = event => {
            if (event.candidate) {
              addDoc(offerCands, event.candidate.toJSON());
            }
          };
    
          var offerDesc = await pc.createOffer();
          await pc.setLocalDescription(offerDesc);
          await setDoc(callDoc, { offer: { sdp: offerDesc.sdp, type: offerDesc.type } });
    
          // Listen for Answer
          onSnapshot(callDoc, snapshot => {
            var data = snapshot.data();
            if (!pc.currentRemoteDescription && data?.answer) {
              pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
          });
    
          // FIX: Listen for remote ICE candidates (answer side)
          onSnapshot(answerCands, snapshot => {
            snapshot.docChanges().forEach(change => {
              if (change.type === 'added') {
                pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
              }
            });
          });
        };

    // ──────────────────────────────────────────────
    // JOIN CALL (Receiver side) — MAIN FIX HERE
    // ──────────────────────────────────────────────
    joinCallBtn.onclick = async () => {
      const callId = callIdInput.value.trim();
      if (!callId) { alert('Please enter a Call ID.'); return; }

      joinCallBtn.disabled = true;
      setStatus('Setting up microphone...', 'connecting');

      const ok = await setupMedia();
      if (!ok) { joinCallBtn.disabled = false; return; }

      createPeerConnection();

      const callDoc    = doc(collection(db, 'calls'), callId);
      const offerCands  = collection(callDoc, 'offerCandidates');
      const answerCands = collection(callDoc, 'answerCandidates');

      // FIX: Set up ICE candidate handler BEFORE setRemoteDescription
      pc.onicecandidate = event => {
        if (event.candidate) {
          addDoc(answerCands, event.candidate.toJSON());
        }
      };

      // FIX: Start listening for remote (offer) ICE candidates BEFORE setting SDP
      // This ensures no early candidates are missed
      onSnapshot(offerCands, snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === 'added') {
            if (pc.remoteDescription) {
              pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
            }
          }
        });
      });

      setStatus('Fetching call info...', 'connecting');
      
            let callData;
            try {
              const snap = await getDoc(callDoc);
              callData = snap.data();
            } catch (err) {
              setStatus('Firestore error: ' + (err.message || err.code || 'check API key & rules'), 'error');
              console.error('getDoc failed:', err);
              joinCallBtn.disabled = false;
              return;
            }
      
            if (!callData?.offer) {
              setStatus('Call ID not found. Check and try again.', 'error');
              joinCallBtn.disabled = false;
              return;
            }
      
            try {
              await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
              const answerDesc = await pc.createAnswer();
              await pc.setLocalDescription(answerDesc);
              await updateDoc(callDoc, { answer: { sdp: answerDesc.sdp, type: answerDesc.type } });
              setStatus('Answer sent. Establishing connection...', 'connecting');
            } catch (err) {
              setStatus('SDP/update error: ' + (err.message || err), 'error');
              console.error('SDP error:', err);
              joinCallBtn.disabled = false;
            }
          };

    // Copy button
        copyBtn.onclick = () => {
          if (!generatedCallId.value) return;
          navigator.clipboard.writeText(generatedCallId.value).then(() => {
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy', 2000);
          });
        };
    
        // SMS Modal Logic
        smsBtn.onclick = () => {
          if (!generatedCallId.value) return;
          smsModal.classList.add('active');
          smsPhoneInput.focus();
        };
    
        cancelSmsBtn.onclick = () => {
          smsModal.classList.remove('active');
          smsPhoneInput.value = '';
        };
    
        sendSmsBtn.onclick = () => {
          var phone = smsPhoneInput.value.trim();
          if (!phone) { 
            alert('Please enter a mobile number.'); 
            return; 
          }
          
          var message = encodeURIComponent("[ Important Call ] Join my call using code: " + generatedCallId.value);
          var separator = navigator.userAgent.match(/iPad|iPhone|iPod/) ? "&" : "?";
          var smsUri = "sms:" + phone + separator + "body=" + message;
          
          window.open(smsUri, "_self");
          
          smsModal.classList.remove('active');
          smsPhoneInput.value = '';
        };
      </script>
</body>
</html>
